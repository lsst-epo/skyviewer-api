name: Deploy to App Engine
on:
  push:
    branches:
      - EPO-5131
jobs:
  deploy_this_noise:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Deploy to App Engine
        uses: google-github-actions/deploy-appengine@main
        env:
          DB_SERVER: ${{ secrets.CLOUD_SQL_PRIVATE_IP }}
          DB_USER: ${{ secrets.CLOUD_SQL_DB_USER }}
          DB_PASSWORD: ${{ secrets.CLOUD_SQL_DB_PASS }}
          DB_DSN: ${{ secrets.CLOUD_SQL_DB_HOST }}
        with:
          deliverables: test/app.yaml
          project_id: skyviewer
          credentials: ${{ secrets.GAE_SA }}
