# docker-compose.yml
version: '2.2'

services:
  nginx:
    image: nginx:alpine
    ports:
      - 9900:81
    depends_on:
      - skyviewer_api
    volumes_from:
      - skyviewer_api
    volumes:
      - ./config-env/default.conf:/etc/nginx/conf.d/default.conf # nginx configuration (see below)

  skyviewer_api:
    image: epo/skyviewer_api:latest
    volumes:
      - ./:/var/www/html/

volumes:
  driver: 